<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Benedictory Invoice</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#edf2f7;
    font-family:Arial,sans-serif;
    padding:30px;
}

.invoice{
    background:white;
    max-width:1300px;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.top{
    background:#dce2db;
    height:240px;
    position:relative;
    overflow:hidden;
}

.wave{
    position:absolute;
    bottom:-40px;
    left:0;
    width:100%;
    height:120px;
    background:white;
    border-radius:50% 50% 0 0;
}

.logo{
    position:absolute;
    top:20px;
    left:40px;
}

.logo img{
    width:320px;
}

.content{
    padding:40px;
}

.heading{
    font-size:34px;
    font-weight:bold;
    color:#065f46;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#065f46;
    color:white;
    padding:12px;
    border:1px solid #d1d5db;
    font-size:15px;
}

table td{
    border:1px solid #d1d5db;
    padding:8px;
}

input{
    width:100%;
    padding:8px;
    outline:none;
}

.quality-heading{
    font-size:32px;
    font-style:italic;
    font-weight:bold;
    text-align:center;
    color:#7a7d2f;
    padding:15px;
    border:1px solid #000;
}

.summary{
    margin-top:35px;
    width:450px;
    margin-left:auto;
}

.summary div{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #ddd;
    font-size:17px;
}

.summary h2{
    font-size:26px;
    color:#065f46;
    margin-bottom:15px;
}

.btns{
    margin-top:30px;
    display:flex;
    gap:15px;
}

button{
    background:#065f46;
    color:white;
    padding:12px 22px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#047857;
}

@media print{

    .btns{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    .invoice{
        box-shadow:none;
    }

}

</style>

</head>

<body>

<div class="invoice">

<div class="top">

<div class="logo">

<img src="LOGO CUT OUT.png">

</div>

<div class="wave"></div>

</div>

<div class="content">

<div class="flex justify-between items-center mb-6">

<div>

<h2 class="heading">
INVOICE
</h2>

<p>
Date :
<input type="date" id="invoiceDate"
style="border:1px solid #ccc;">
</p>

</div>

<div>

<p>
Client Name :
<input type="text"
placeholder="Enter Client Name"
style="border:1px solid #ccc;">
</p>

</div>

</div>

<!-- QUALITY NAME -->

<div style="margin-bottom:25px;">

<input
type="text"
id="qualityName"
placeholder="Door/Gurjan face /DC/Pine Frame/Lakkad Filler"
class="quality-heading"
>

</div>

<table id="invoiceTable">

<thead>

<tr>
<th>Thickness</th>
<th>Size</th>
<th>Quantity</th>
<th>Quantity SQF</th>
<th>Weight</th>
<th>Rate</th>
<th>Amount</th>
<th>Remove</th>
</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

<div class="btns">

<button onclick="addRow()">
+ Add Product
</button>

<button onclick="window.print()">
Download Invoice
</button>

</div>

<!-- SUMMARY -->

<div class="summary">

<h2>
Summary
</h2>

<div>
<span>Total SQF</span>
<span id="totalSQF">0</span>
</div>

<div>
<span>Total Weight</span>
<span id="totalWeight">0 KG</span>
</div>

<div>
<span>Total Product Amount</span>
<span id="totalAmount">₹0</span>
</div>

<div>
<span>Billing %</span>
<span>
<input type="number"
id="billingPercent"
value="40"
oninput="updateTotals()"
style="width:80px;border:1px solid #ccc;">
</span>
</div>

<div>
<span>Billing Amount</span>
<span id="billingAmount">₹0</span>
</div>

<div>
<span>GST 18%</span>
<span id="gstAmount">₹0</span>
</div>

<div>
<span>Transferable Amount</span>
<span id="transferAmount">₹0</span>
</div>

<div>
<span>Other Amount</span>
<span id="otherAmount">₹0</span>
</div>

<div style="font-weight:bold;font-size:22px;">
<span>Total Order Amount</span>
<span id="finalAmount">₹0</span>
</div>

</div>

</div>

</div>

<script>

function addRow(){

const row = document.createElement("tr");

row.innerHTML = `

<td>
<input type="text"
class="thickness"
placeholder="18mm"
oninput="calculate(this)">
</td>

<td>
<input type="text"
placeholder="8x4">
</td>

<td>
<input type="number"
class="qty"
value="1"
oninput="calculate(this)">
</td>

<td>
<input type="number"
class="sqf"
placeholder="32"
oninput="calculate(this)">
</td>

<td>
<input type="text"
class="weight"
readonly>
</td>

<td>
<input type="number"
class="rate"
placeholder="50"
oninput="calculate(this)">
</td>

<td>
<input type="text"
class="amount"
readonly>
</td>

<td>
<button onclick="removeRow(this)">
X
</button>
</td>

`;

document.getElementById("tbody")
.appendChild(row);

}

function removeRow(btn){

btn.parentElement.parentElement.remove();

updateTotals();

}

function calculate(el){

const row =
el.parentElement.parentElement;

const thickness =
row.querySelector(".thickness")
.value.toLowerCase();

const quality =
document.getElementById("qualityName")
.value.toLowerCase();

const qty =
Number(row.querySelector(".qty")
.value || 0);

const sqf =
Number(row.querySelector(".sqf")
.value || 0);

const rate =
Number(row.querySelector(".rate")
.value || 0);

let weightPerQty = 0;

const isALT =
quality.includes("alt");

if(isALT){

if(thickness.includes("6")){
weightPerQty = 0.300;
}

else if(thickness.includes("9")){
weightPerQty = 14.5;
}

else if(thickness.includes("12")){
weightPerQty = 21;
}

else if(thickness.includes("18")){
weightPerQty = 1.3;
}

}else{

if(thickness.includes("6")){
weightPerQty = 0.200;
}

else if(thickness.includes("9")){
weightPerQty = 0.400;
}

else if(thickness.includes("12")){
weightPerQty = 0.570;
}

else if(thickness.includes("18")){
weightPerQty = 0.900;
}

}

const totalWeight =
qty * weightPerQty;

const amount =
qty * sqf * rate;

row.querySelector(".weight").value =
totalWeight.toFixed(2)+" KG";

row.querySelector(".amount").value =
"₹"+amount.toLocaleString("en-IN");

updateTotals();

}

function updateTotals(){

let totalSQF = 0;
let totalWeight = 0;
let totalAmount = 0;

document.querySelectorAll("#tbody tr")
.forEach(row=>{

const qty =
Number(row.querySelector(".qty")
.value || 0);

const sqf =
Number(row.querySelector(".sqf")
.value || 0);

const weight =
Number(
(row.querySelector(".weight")
.value || "0")
.replace(" KG","")
);

const amount =
Number(
(row.querySelector(".amount")
.value || "0")
.replace(/[^0-9.]/g,"")
);

totalSQF += qty * sqf;

totalWeight += weight;

totalAmount += amount;

});

document.getElementById("totalSQF")
.innerText =
totalSQF.toFixed(2);

document.getElementById("totalWeight")
.innerText =
totalWeight.toFixed(2)+" KG";

document.getElementById("totalAmount")
.innerText =
"₹"+totalAmount.toLocaleString("en-IN");

const billingPercent =
Number(
document.getElementById("billingPercent")
.value || 0
);

const billingAmount =
(totalAmount * billingPercent)/100;

const gst =
billingAmount * 0.18;

const transfer =
billingAmount + gst;

const other =
totalAmount - billingAmount;

const final =
transfer + other;

document.getElementById("billingAmount")
.innerText =
"₹"+billingAmount.toLocaleString("en-IN");

document.getElementById("gstAmount")
.innerText =
"₹"+gst.toLocaleString("en-IN");

document.getElementById("transferAmount")
.innerText =
"₹"+transfer.toLocaleString("en-IN");

document.getElementById("otherAmount")
.innerText =
"₹"+other.toLocaleString("en-IN");

document.getElementById("finalAmount")
.innerText =
"₹"+final.toLocaleString("en-IN");

}

addRow();

</script>

</body>
</html>
