<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benedictory Invoice</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
    body{
        background:#f3f4f6;
        font-family: Arial, sans-serif;
    }

    .invoice-box{
        width:1200px;
        margin:auto;
        background:white;
        padding:30px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:10px;
    }

    th,td{
        border:1px solid #000;
        padding:10px;
        text-align:center;
        font-size:15px;
    }

    th{
        background:#d8d8d8;
        font-size:20px;
        color:#7a7f2c;
        font-style:italic;
    }

    .quality-heading{
        font-size:28px;
        font-style:italic;
        color:#7a7f2c;
        text-align:center;
        margin-top:30px;
        margin-bottom:10px;
        font-weight:bold;
        text-decoration:underline;
    }

    .summary-box{
        width:450px;
        margin-left:auto;
        margin-top:30px;
    }

    .summary-box td{
        text-align:left;
        font-size:18px;
    }

    .download-btn{
        background:#166534;
        color:white;
        padding:12px 25px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:18px;
        margin-top:20px;
    }

    input{
        width:100%;
        border:none;
        outline:none;
        text-align:center;
        background:transparent;
    }

    @media print{
        .no-print{
            display:none;
        }
    }
</style>
</head>

<body>

<div class="invoice-box" id="invoice">

    <!-- LOGO -->
    <div style="text-align:center;">
        <img src="https://i.imgur.com/yY0QY8h.png" style="width:300px;">
    </div>

    <!-- QUALITY -->
    <div class="quality-heading">
        <input type="text" id="qualityName"
        value="Door/Gurjan face /DC/Pine Frame/Lakkad Filler">
    </div>

    <!-- TABLE -->
    <table id="invoiceTable">
        <thead>
            <tr>
                <th>Thickness</th>
                <th>Size</th>
                <th>Quantity</th>
                <th>Quantity SQF</th>
                <th>Weight</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody id="tbody">

            <tr>
                <td>
                    <input type="text" class="thickness" value="18mm">
                </td>

                <td>
                    <input type="text" value="8x4">
                </td>

                <td>
                    <input type="number" class="qty" value="10">
                </td>

                <td>
                    <input type="number" value="320">
                </td>

                <td class="weight">0</td>

                <td>
                    <input type="number" class="amount" value="50000">
                </td>
            </tr>

        </tbody>
    </table>

    <!-- BUTTONS -->
    <div class="no-print" style="margin-top:15px;">

        <button onclick="addRow()"
        class="download-btn">
            + Add Row
        </button>

    </div>

    <!-- SUMMARY -->
    <table class="summary-box">

        <tr>
            <td><b>Total Weight</b></td>
            <td id="totalWeight">0 KG</td>
        </tr>

        <tr>
            <td><b>Product Amount</b></td>
            <td id="productAmount">₹0</td>
        </tr>

        <tr>
            <td><b>Billing %</b></td>
            <td>
                <input type="number" id="billingPercent"
                value="40">
            </td>
        </tr>

        <tr>
            <td><b>Billing Amount</b></td>
            <td id="billingAmount">₹0</td>
        </tr>

        <tr>
            <td><b>GST 18%</b></td>
            <td id="gstAmount">₹0</td>
        </tr>

        <tr>
            <td><b>Transferable Amount</b></td>
            <td id="transferableAmount">₹0</td>
        </tr>

        <tr>
            <td><b>Other Amount</b></td>
            <td id="otherAmount">₹0</td>
        </tr>

        <tr>
            <td><b>Total Order Amount</b></td>
            <td id="finalAmount">₹0</td>
        </tr>

    </table>

    <!-- DOWNLOAD -->
    <div class="no-print" style="text-align:center;">

        <button onclick="window.print()"
        class="download-btn">
            Download Invoice
        </button>

    </div>

</div>

<script>

function getWeight(thickness, quality){

    thickness = thickness.toLowerCase();
    quality = quality.toLowerCase();

    // ALT WEIGHT
    if(quality.includes("alt")){

        if(thickness.includes("18")) return 1.3;
        if(thickness.includes("12")) return 21;
        if(thickness.includes("9")) return 14.5;
        if(thickness.includes("6")) return 0.3;

    }

    // POPULAR WEIGHT
    else{

        if(thickness.includes("18")) return 0.9;
        if(thickness.includes("12")) return 0.57;
        if(thickness.includes("9")) return 0.4;
        if(thickness.includes("6")) return 0.2;

    }

    return 0;
}

function calculate(){

    let totalWeight = 0;
    let totalAmount = 0;

    let quality =
    document.getElementById("qualityName").value;

    document.querySelectorAll("#tbody tr").forEach(row=>{

        let thickness =
        row.querySelector(".thickness").value;

        let qty =
        parseFloat(row.querySelector(".qty").value) || 0;

        let amount =
        parseFloat(row.querySelector(".amount").value) || 0;

        let singleWeight =
        getWeight(thickness, quality);

        let finalWeight =
        qty * singleWeight;

        row.querySelector(".weight").innerHTML =
        finalWeight.toFixed(2) + " KG";

        totalWeight += finalWeight;

        totalAmount += amount;

    });

    document.getElementById("totalWeight").innerHTML =
    totalWeight.toFixed(2) + " KG";

    document.getElementById("productAmount").innerHTML =
    "₹" + totalAmount.toLocaleString();

    let billingPercent =
    parseFloat(document.getElementById("billingPercent").value) || 0;

    let billingAmount =
    totalAmount * billingPercent / 100;

    let gst =
    billingAmount * 18 / 100;

    let transferable =
    billingAmount + gst;

    let other =
    totalAmount - billingAmount;

    let final =
    transferable + other;

    document.getElementById("billingAmount").innerHTML =
    "₹" + billingAmount.toLocaleString();

    document.getElementById("gstAmount").innerHTML =
    "₹" + gst.toLocaleString();

    document.getElementById("transferableAmount").innerHTML =
    "₹" + transferable.toLocaleString();

    document.getElementById("otherAmount").innerHTML =
    "₹" + other.toLocaleString();

    document.getElementById("finalAmount").innerHTML =
    "₹" + final.toLocaleString();
}

function addRow(){

    let tr = document.createElement("tr");

    tr.innerHTML = `

        <td>
            <input type="text"
            class="thickness"
            value="18mm">
        </td>

        <td>
            <input type="text"
            value="8x4">
        </td>

        <td>
            <input type="number"
            class="qty"
            value="1">
        </td>

        <td>
            <input type="number"
            value="32">
        </td>

        <td class="weight">0</td>

        <td>
            <input type="number"
            class="amount"
            value="0">
        </td>

    `;

    document.getElementById("tbody").appendChild(tr);

    attachEvents();

    calculate();
}

function attachEvents(){

    document.querySelectorAll("input").forEach(input=>{

        input.removeEventListener("input", calculate);

        input.addEventListener("input", calculate);

    });
}

attachEvents();

calculate();

</script>

</body>
</html>
