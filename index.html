<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benedictory Invoice Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f3f4f6;
font-family:sans-serif;
}

</style>

</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<div class="bg-white rounded-2xl shadow-xl p-8">

<div class="flex items-center justify-between mb-8">

<div>
<h1 class="text-4xl font-bold text-amber-700">
BENEDICTORY
</h1>

<p class="text-gray-500">
THE FUTURE OF NEXT GEN
</p>
</div>

</div>

<!-- CLIENT -->

<div class="mb-8">

<label class="block mb-2 font-semibold">
Client Name
</label>

<input
type="text"
id="clientName"
class="w-full border p-3 rounded-xl"
placeholder="Enter Client Name"
/>

</div>

<!-- TABLE -->

<div class="overflow-auto">

<table class="w-full border border-gray-300">

<thead class="bg-amber-100">

<tr>

<th class="border p-3">
Thickness
</th>

<th class="border p-3">
Quality
</th>

<th class="border p-3">
Size
</th>

<th class="border p-3">
Quantity
</th>

<th class="border p-3">
Quantity SQF
</th>

<th class="border p-3">
Rate
</th>

<th class="border p-3">
Amount
</th>

<th class="border p-3">
Weight
</th>

<th class="border p-3">
Action
</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<!-- BUTTON -->

<div class="mt-6 flex gap-4">

<button
onclick="addRow()"
class="bg-blue-600 text-white px-6 py-3 rounded-xl"
>
+ Add Product
</button>

<button
onclick="generateInvoice()"
class="bg-green-600 text-white px-6 py-3 rounded-xl"
>
Generate Invoice
</button>

</div>

<!-- TOTAL -->

<div class="mt-10 bg-gray-100 p-6 rounded-2xl">

<div class="flex justify-between mb-3">
<span>Product Amount</span>
<span id="productAmount">₹0</span>
</div>

<div class="flex justify-between mb-3">
<span>Billing Amount</span>
<span id="billingAmount">₹0</span>
</div>

<div class="flex justify-between mb-3">
<span>GST 18%</span>
<span id="gstAmount">₹0</span>
</div>

<div class="flex justify-between mb-3">
<span>Transferable Amount</span>
<span id="transferAmount">₹0</span>
</div>

<div class="flex justify-between mb-3">
<span>Other Amount</span>
<input
type="number"
id="otherAmount"
value="0"
class="border rounded p-2 w-40"
oninput="calculateTotals()"
/>
</div>

<div class="flex justify-between mb-3">
<span>Total Weight</span>
<span id="totalWeight">0 KG</span>
</div>

<hr class="my-4">

<div class="flex justify-between text-2xl font-bold text-green-700">

<span>Total Order Amount</span>

<span id="finalAmount">
₹0
</span>

</div>

</div>

</div>

</div>

<script>

function addRow(){

const row = document.createElement("tr");

row.innerHTML = `

<td class="border p-2">
<input type="text" class="thickness w-full border p-2 rounded" placeholder="18MM">
</td>

<td class="border p-2">
<select class="quality w-full border p-2 rounded">

<option value="popular">
Popular
</option>

<option value="alt">
ALT
</option>

</select>
</td>

<td class="border p-2">
<input type="text" class="size w-full border p-2 rounded" placeholder="8x4">
</td>

<td class="border p-2">
<input type="number" class="qty w-full border p-2 rounded" value="1" oninput="calculateTotals()">
</td>

<td class="border p-2">
<input type="number" class="sqf w-full border p-2 rounded" value="32" oninput="calculateTotals()">
</td>

<td class="border p-2">
<input type="number" class="rate w-full border p-2 rounded" value="0" oninput="calculateTotals()">
</td>

<td class="border p-2 amount">
₹0
</td>

<td class="border p-2 weight">
0 KG
</td>

<td class="border p-2">

<button
onclick="removeRow(this)"
class="bg-red-500 text-white px-3 py-2 rounded"
>
Delete
</button>

</td>

`;

document.getElementById("tableBody")
.appendChild(row);

calculateTotals();

}

function removeRow(btn){

btn.parentElement.parentElement.remove();

calculateTotals();

}

function calculateTotals(){

const rows =
document.querySelectorAll("#tableBody tr");

let productAmount = 0;

let totalWeight = 0;

rows.forEach(row=>{

const thickness =
row.querySelector(".thickness").value.toLowerCase();

const quality =
row.querySelector(".quality").value.toLowerCase();

const qty =
Number(row.querySelector(".qty").value||0);

const sqf =
Number(row.querySelector(".sqf").value||0);

const rate =
Number(row.querySelector(".rate").value||0);

const amount = sqf * rate;

row.querySelector(".amount").innerText =
"₹"+amount.toLocaleString("en-IN");

productAmount += amount;

let weightPerSqf = 0;

// POPULAR

if(quality==="popular"){

if(thickness.includes("6")){
weightPerSqf = 0.2;
}

else if(thickness.includes("9")){
weightPerSqf = 0.4;
}

else if(thickness.includes("12")){
weightPerSqf = 0.57;
}

else if(thickness.includes("18")){
weightPerSqf = 0.9;
}

}

// ALT

if(quality==="alt"){

if(thickness.includes("6")){
weightPerSqf = 0.3;
}

else if(thickness.includes("9")){
weightPerSqf = 0.45;
}

else if(thickness.includes("12")){
weightPerSqf = 0.65;
}

else if(thickness.includes("18")){
weightPerSqf = 1.3;
}

}

const weight = sqf * weightPerSqf;

row.querySelector(".weight").innerText =
weight.toFixed(2)+" KG";

totalWeight += weight;

});

const billingAmount = productAmount;

const gst = billingAmount * 0.18;

const transfer =
billingAmount + gst;

const other =
Number(document.getElementById("otherAmount").value||0);

const final =
transfer + other;

document.getElementById("productAmount").innerText =
"₹"+productAmount.toLocaleString("en-IN");

document.getElementById("billingAmount").innerText =
"₹"+billingAmount.toLocaleString("en-IN");

document.getElementById("gstAmount").innerText =
"₹"+gst.toLocaleString("en-IN");

document.getElementById("transferAmount").innerText =
"₹"+transfer.toLocaleString("en-IN");

document.getElementById("finalAmount").innerText =
"₹"+final.toLocaleString("en-IN");

document.getElementById("totalWeight").innerText =
totalWeight.toFixed(2)+" KG";

}

function generateInvoice(){

window.print();

}

addRow();

</script>

</body>
</html>
